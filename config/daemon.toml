# thinklocal-mcp Daemon Konfiguration

[daemon]
port = 9440
runtime_mode = "lan"    # local = localhost-only ohne TLS, lan = 0.0.0.0 mit TLS
bind_host = "0.0.0.0"   # Optionaler Override; wird sonst aus runtime_mode abgeleitet
hostname = ""            # Leer = Auto-Detect via os.hostname()
tls_enabled = true       # Optionaler Override; wird sonst aus runtime_mode abgeleitet
agent_type = "claude-code"
data_dir = "~/.thinklocal"
# ADR-022 Phase 3 (Per-Node-Sender-Flip): kanonische node/<PeerID>-Identität als
# envelope.sender/agent_id emittieren statt Legacy host/<id>. Greift NUR, wenn libp2p
# aktiv ist UND das laufende mTLS-Cert bereits die EIGENE node/<PeerID>-SAN trägt
# (.94-PoP-Cert) UND der Cert-Issuer die attestierende CA ist. Sonst Fail-safe → Legacy.
# Default true (sicher dank Fail-safe). Opt-out: Env TLMCP_EMIT_CANONICAL_SENDER=0
emit_canonical_sender = true

[mesh]
heartbeat_interval_ms = 10000
heartbeat_timeout_missed = 3

[discovery]
mdns_service_type = "_thinklocal._tcp"

# ADR-019: Multi-Interface Discovery Policy
# Bei Multi-Homed Hosts (mehrere NICs in verschiedenen Subnetzen) wird
# bonjour-service ohne Pinning auf ein "falsches" Interface published
# (z.B. DMZ statt LAN). Diese Optionen begrenzen Discovery auf das Mesh-Subnet.
#
# Wenn leer: auto-detect (alle nicht-virtuellen Interfaces erlaubt).
# Empfohlen fuer Multi-Subnet-Hosts: explizit setzen.
#
# allowed_mesh_cidrs = ["10.10.10.0/24"]
allowed_mesh_cidrs = []
#
# Interface-Namen die ausgeschlossen werden (Glob-Patterns "name*" oder "*name").
# Wenn leer: Default-Excludes (docker*, tailscale*, utun*, veth*, bridge*, br-*,
# tun*, tap*, awdl*, llw*, anpi*, ap*, gif*, stf*, lo*) werden verwendet.
# exclude_interface_patterns = ["docker*", "tailscale*", "utun*"]
exclude_interface_patterns = []
#
# Dual-homed-macOS-Workaround (.55-Bug, ADR-019, v0.34.5): Auf manchen dual-homed
# macOS-Hosts vergiftet der mDNS-Socket-Interface-Pin (setMulticastInterface) den
# connectx-scoped-routing-Zustand PROZESSWEIT — die Mesh-Route kippt in REJECT und
# ALLE ausgehenden Connects bekommen EHOSTUNREACH. Es gibt ZWEI Quellen: (1) der
# bonjour-Socket-Interface-Pin (Startup) und (2) @libp2p/mdns als zweite multicast-
# dns-Instanz (~27s nach Start). Dieses Flag deaktiviert BEIDE: bonjour ohne
# interface-Pin (bindet 0.0.0.0) UND der libp2p-mDNS-Peer-Discovery-Service wird
# weggelassen. A-Record-Hygiene bleibt aktiv; libp2p startet weiter, Peers via
# static_peer/HTTPS-Mesh. NUR auf betroffenen macOS-Nodes setzen und IMMER mit
# allowed_mesh_cidrs + static_peers kombinieren. Env: TLMCP_DISABLE_MDNS_INTERFACE_PIN=1.
# disable_mdns_interface_pin = true
disable_mdns_interface_pin = false

[libp2p]
enabled = true                  # Wird im local-Modus implizit deaktiviert, ausser per Env-Override
listen_port = 9540              # Default: daemon.port + 100
mdns_service_tag = "thinklocal-mcp"
nat_traversal_enabled = true    # AutoNAT + Relay-Assist fuer VPN/Tailscale/Cross-Subnet-Szenarien
relay_transport_enabled = true  # Erlaubt Circuit-Relay als Fallback-Pfad
relay_service_enabled = false   # Nur auf expliziten Relay-Nodes aktivieren
announce_multiaddrs = []        # Optional: oeffentliche oder Relay-Multiaddrs explizit announcen

# Statische Peers als Fallback wenn mDNS nicht funktioniert (z.B. ueber VPN)
# Beispiel:
# [[discovery.static_peers]]
# host = "10.10.10.56"
# port = 9440
# name = "influxdb-server"
#
# [[discovery.static_peers]]
# host = "192.168.1.100"
# port = 9440
# name = "remote-agent"
#
# Oder per Umgebungsvariable: TLMCP_STATIC_PEERS="10.10.10.56:9440,192.168.1.100:9440"

[logging]
level = "info"           # trace, debug, info, warn, error, fatal

# ADR-032: Phantom-Announce-Guard. Dieses Config-Template wird fleet-weit ausgeliefert.
# `serve_shared` designiert diesen Node als Provider: nur dann werden die unten
# deklarierten `[[mcp.share]]`-MCPs tatsaechlich als `mcp:<server>` announced. Default
# false (fail-safe) → ein Spoke, der nur das Template ausliefert, announced KEINE
# Phantom-Provider. Der Hub setzt `serve_shared = true` (oder Env TLMCP_MCP_SERVE_SHARED=1).
[mcp]
serve_shared = false

# ADR-028 D4-a: geteilte MCP-Server (Discovery default-open).
# Jeder hier deklarierte MCP wird beim Start als mesh-Capability `mcp:<server>`
# registriert (NUR wenn serve_shared=true, s.o.) und ist fleet-weit aufloesbar (kein
# SSH). Default-open: ein Eintrag ist geteilt, ausser `share = false`. `description`
# ist Pflicht. `permissions` + `trust_level` bestimmen die Ausfuehrungsstufe.
# Beispiel:
# [[mcp.share]]
# server = "markitdown"
# description = "Markdown-Konvertierung beliebiger Dokumente"
# tools = ["convert"]
# version = "1.0.0"
# permissions = ["convert"]
# trust_level = 5
#
# [[mcp.share]]
# server = "unifi"
# description = "UniFi-Controller — Netzwerk-Status"
# permissions = ["network.read"]
# trust_level = 4
# share = false          # explizit NICHT teilen (opt-out)

# ── v5 Spur 3 / Modell B Beta (T3.1, Christian-Gate Q1 = JA, 2026-07-01) ──
# remote-forward-only: der Hub (TH01) serviert pal + unifi zentral; Spokes rufen sie
# ueber ihren lokalen Daemon-Proxy (/api/mcp/<server>) auf. Diese Eintraege NUR auf
# dem servierenden Hub aktiv lassen — Spoke-Nodes, die selbst nichts servieren,
# entfernen sie (sonst wuerden sie faelschlich mcp:pal/mcp:unifi announcen).
# Hardware-gebundene MCPs (e3dc, idm, ...) sind KNOTENGEBUNDEN und NICHT Teil des
# Beta-Forwards — hier bewusst nicht deklariert.
# Stufe (self/gate/consensus) wird aus permissions/trust_level abgeleitet; die
# read-only-Beta (list_clients) ergibt `self`. Schreibende Tools spaeter → write/
# control/credential in permissions ergaenzen → hebt automatisch auf `gate`.
[[mcp.share]]
server = "pal"
description = "PAL — Multi-Modell-Berater & Reviewer (Konsens, Code-Review, Chat, Planung)"
tools = ["chat", "consensus", "codereview", "thinkdeep", "planner"]
version = "1.0.0"
permissions = ["query"]
trust_level = 5

[[mcp.share]]
server = "unifi"
description = "UniFi-Controller — Netzwerk-Status & Client-Liste"
tools = ["list_clients", "list_devices", "get_status"]
version = "1.0.0"
permissions = ["network.read"]
trust_level = 4
